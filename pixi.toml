[workspace]
name = "fasthep-flow"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.11"
pip = "*"
python-build = "*"
hatchling = "*"
hatch-vcs = "*"
pytest = "*"
ruff = "*"
mypy = "*"
pre-commit = "*"
codespell = "*"

[pypi-dependencies]
fasthep-flow = { path = ".", editable = true }

[tasks]
format = "ruff format src"
lint = "ruff check src"
lint-fix = "ruff check --fix src"
typecheck = "mypy src"
test = "python -c 'print(\"no tests yet\")'"
build = "python -m build"
check = { depends-on = ["lint", "typecheck", "test"] }
ci = { depends-on = ["check", "build"] }
