[workspace]
name = "fasthep-flow"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.11"
pip = "*"
python-build = "*"
hatchling = "*"
hatch-vcs = "*"
pytest = "*"
ruff = "*"
mypy = "*"
pre-commit = "*"
codespell = "*"
twine = "*"

[pypi-dependencies]
fasthep-flow = { path = ".", editable = true }
vulture = ">=2.16, <3"
deptry = ">=0.25.1, <0.26"

[environments]
py311 = ["py311"]
py313 = ["py313"]
py314 = ["py314"]

[feature.py311.dependencies]
python = "3.11.*"

[feature.py313.dependencies]
python = "3.13.*"

[feature.py314.dependencies]
python = "3.14.*"

[tasks]
format = "ruff format src tests"
lint = "ruff check src tests"
lint-fix = "ruff check --fix src tests"
typecheck = "mypy src tests"
test = "pytest"
build = "python -m build"
check = { depends-on = ["lint", "typecheck", "test"] }
ci = { depends-on = ["check", "build"] }
check-dist = "twine check dist/*"
