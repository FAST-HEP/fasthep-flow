version: 1.0

registry:
  sources:
    toy.source:
      spec: tests.toy_components.sources:TOY_SOURCE_SPEC
      impl: tests.toy_components.sources:run_toy_source
  transforms:
    toy.scale:
      spec: tests.toy_components.transforms:TOY_SCALE_SPEC
      impl: tests.toy_components.transforms:run_toy_scale
  sinks:
    toy.write:
      spec: tests.toy_components.sinks:TOY_WRITE_SPEC
      impl: tests.toy_components.sinks:run_toy_write

sources:
  events:
    kind: toy.source
    stream_type: event_stream

analysis:
  stages:
    - id: Scale
      op: toy.scale
      params:
        factor: 2
      write:
        - kind: toy.write
          path: output.json
          when: final
