tasks:
  - name: root_data
    type: "fasthep_flow.io.Uproot5Import"
    kwargs:
      input_file: "tests/data/single_tree.root"
      tree_names: "events"
      branches:
        - "MET_pt"
        - "MET_phi"
  - name: printMET
    type: "fasthep_flow.operators.ProcessOperator"
    kwargs:
      data_key: "root_data"
      process_with:
        type: "fasthep_flow.operators.PythonOperator"
        kwargs:
          python_callable: "print"
    needs:
      - "root_data"
