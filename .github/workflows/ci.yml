name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "3"

jobs:
  ci:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - pixi-env: py311
            python-version: "3.11"
            experimental: false

          - pixi-env: py313
            python-version: "3.13"
            experimental: false

          - pixi-env: py314
            python-version: "3.14"
            experimental: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.62.2
          cache: false

      - name: Run CI
        run: pixi run --environment ${{ matrix.pixi-env }} ci
