# Temporary alpha workflow.
# Installs FAST-HEP dependencies from Git main because PyPI releases may lag during alpha.
# Remove this workflow once package APIs stabilise and normal PyPI-based CI is required again.
name: Alpha CI

on:
  push:
  pull_request:

jobs:
  alpha-ci:
    name: Python 3.12
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          import subprocess
          import sys
          import tomllib

          with open("pyproject.toml", "rb") as handle:
              project = tomllib.load(handle)["project"]
          requirements = [
              dep for dep in project.get("dependencies", [])
              if not dep.startswith("fasthep")
          ]
          requirements.extend(project.get("optional-dependencies", {}).get("test", []))
          requirements.extend(["ruff", "mypy", "build"])
          subprocess.check_call([sys.executable, "-m", "pip", "install", *requirements])
          PY
          python -m pip install -e . --no-deps

      - name: Lint
        run: ruff check src tests

      - name: Typecheck
        run: mypy src tests

      - name: Test
        run: pytest
